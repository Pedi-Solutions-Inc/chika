name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package versions
        run: |
          cd packages/types && npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          cd ../sdk && npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Update SDK dependency on types
        run: |
          cd packages/sdk
          VERSION="${{ steps.version.outputs.version }}"
          cat package.json | jq --arg v "^$VERSION" '.dependencies["@pedi/chika-types"] = $v' > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish @pedi/chika-types
        run: cd packages/types && npm publish --access public

      - name: Publish @pedi/chika-sdk
        run: cd packages/sdk && npm publish --access public
