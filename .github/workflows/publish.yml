name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package versions and update SDK dependency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            for (const p of ['packages/types', 'packages/sdk']) {
              const f = p + '/package.json';
              const j = JSON.parse(fs.readFileSync(f));
              j.version = '$VERSION';
              if (j.dependencies && j.dependencies['@pedi/chika-types']) {
                j.dependencies['@pedi/chika-types'] = '^$VERSION';
              }
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Publish @pedi/chika-types
        run: cd packages/types && npm publish --access public

      - name: Publish @pedi/chika-sdk
        run: cd packages/sdk && npm publish --access public
